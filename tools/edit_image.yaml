identity:
  name: edit_image
  author: takumi
  label:
    en_US: Edit Image
    ja_JP: 画像編集
    zh_Hans: 编辑图像

description:
  human:
    en_US: >
      Edit an existing image using natural language instructions with Nano Banana Pro.
      Supports style changes, object addition/removal, color adjustments, text overlay,
      and more.
    ja_JP: >
      Nano Banana Proを使用して、自然言語の指示で既存の画像を編集します。
      スタイル変更、オブジェクトの追加・削除、色調調整、テキストオーバーレイ
      などをサポートします。
  llm: >
    Edit an existing image using text instructions. Provide the image and describe
    what changes to make. Supports: style transfer, object addition/removal,
    color grading, text overlay, background changes, inpainting, and more.

parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: Edit Instructions
      ja_JP: 編集指示
      zh_Hans: 编辑指令
    human_description:
      en_US: Describe what changes to make to the image.
      ja_JP: 画像に加える変更を記述してください。
    llm_description: >
      Natural language instructions describing the edits to apply to the input image.
      Be specific about what to change, add, remove, or modify.
      Examples: "Make it look like sunset", "Remove the person on the left",
      "Change the background to a beach scene", "Add the text 'Hello World' at the top".
    form: llm

  - name: image
    type: file
    required: true
    label:
      en_US: Input Image
      ja_JP: 入力画像
      zh_Hans: 输入图像
    human_description:
      en_US: The image to edit. Supported formats are JPEG, PNG, WebP, HEIC, HEIF.
      ja_JP: 編集する画像。JPEG、PNG、WebP、HEIC、HEIF形式をサポートします。
    llm_description: >
      The source image to be edited. Upload or provide the image file that
      you want to modify based on the edit instructions.
    form: llm

  - name: system_prompt
    type: string
    required: false
    label:
      en_US: System Prompt
      ja_JP: システムプロンプト
      zh_Hans: 系统提示词
    human_description:
      en_US: >
        Optional system instruction to guide the model's behavior.
        For example, you can set a consistent editing style or constraints.
      ja_JP: >
        モデルの動作を制御するオプションのシステム指示。
        例えば、一貫した編集スタイルや制約を設定できます。
    form: form

  - name: aspect_ratio
    type: select
    required: false
    default: "auto"
    label:
      en_US: Aspect Ratio
      ja_JP: アスペクト比
    human_description:
      en_US: The aspect ratio of the output image.
      ja_JP: 出力画像のアスペクト比。
    options:
      - value: "auto"
        label:
          en_US: "Auto"
          ja_JP: "自動"
      - value: "1:1"
        label:
          en_US: "1:1 (Square)"
          ja_JP: "1:1（正方形）"
      - value: "16:9"
        label:
          en_US: "16:9 (Landscape)"
          ja_JP: "16:9（横長）"
      - value: "9:16"
        label:
          en_US: "9:16 (Portrait)"
          ja_JP: "9:16（縦長）"
      - value: "4:3"
        label:
          en_US: "4:3 (Standard)"
          ja_JP: "4:3（標準）"
      - value: "3:4"
        label:
          en_US: "3:4 (Portrait Standard)"
          ja_JP: "3:4（縦長標準）"
    form: form

  - name: resolution
    type: select
    required: false
    default: "auto"
    label:
      en_US: Resolution
      ja_JP: 解像度
    human_description:
      en_US: Output resolution.
      ja_JP: 出力解像度。
    options:
      - value: "auto"
        label:
          en_US: "Auto"
          ja_JP: "自動"
      - value: "1K"
        label:
          en_US: "1K (1024px)"
          ja_JP: "1K（1024px）"
      - value: "2K"
        label:
          en_US: "2K (2048px)"
          ja_JP: "2K（2048px）"
      - value: "4K"
        label:
          en_US: "4K (4096px)"
          ja_JP: "4K（4096px）"
    form: form

extra:
  python:
    source: tools/edit_image.py
