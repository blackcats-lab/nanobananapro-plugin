version: 0.0.1
type: plugin
author: "takumi"
name: "nanobananapro"
description:
  en_US: "Generate and edit images using Google's Nano Banana Pro (Gemini 3 Pro Image) model via the Gemini API."
  ja_JP: "Google Gemini APIのNano Banana Pro（Gemini 3 Pro Image）モデルを使用して画像を生成・編集するプラグイン。"
  zh_Hans: "使用Google Gemini API的Nano Banana Pro（Gemini 3 Pro Image）模型生成和编辑图像。"
icon: "icon.svg"
label:
  en_US: "Nano Banana Pro"
  ja_JP: "Nano Banana Pro"
  zh_Hans: "Nano Banana Pro"
created_at: "2025-02-14T00:00:00.000Z"
resource:
  memory: 268435456
  permission:
    tool:
      enabled: true
    model:
      enabled: false
      llm: false
      text_embedding: false
      rerank: false
      tts: false
      speech2text: false
      moderation: false
    node:
      enabled: false
    endpoint:
      enabled: false
    app:
      enabled: false
    storage:
      enabled: true
      size: 1048576
  verify:
    enabled: false
plugins:
  tools:
    - "provider/nanobananapro.yaml"
meta:
  version: "0.0.1"
  arch:
    - "amd64"
    - "arm64"
  runner:
    language: "python"
    version: "3.12"
    entrypoint: "main"
